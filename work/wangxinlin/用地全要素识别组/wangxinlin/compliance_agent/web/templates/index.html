<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用地识别智能体</title>
  <script>window.CESIUM_BASE_URL = 'https://cdn.jsdelivr.net/npm/cesium@1.119/Build/Cesium/';</script>
  <script src="https://cdn.jsdelivr.net/npm/cesium@1.119/Build/Cesium/Cesium.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/cesium@1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>用地识别智能体</h1>
    <nav class="header-nav">
      <a href="/" class="active">地图分析</a>
      <a href="/eval">评测</a>
    </nav>
  </header>
  <main class="two-column">
    <!-- 左栏：卫星地图显示区（70%） -->
    <section class="panel panel-left" id="mapPanel">
      <div id="cesiumContainer"></div>
    </section>

    <!-- 右栏：用户交互区（30%） -->
    <aside class="panel panel-right" id="interactionPanel">

      <!-- 模块切换标签 -->
      <div class="module-tabs">
        <button class="module-tab active" data-module="compliance">用地合规提示</button>
        <button class="module-tab" data-module="comparison">现状基底校核</button>
      </div>

      <!-- ═══ 模块1：用地合规提示 ═══ -->
      <div class="module-content" id="moduleCompliance">
        <div class="module-desc">土地使用合规审查，事前自查、风险提示、监管核查</div>

        <!-- 输入区 -->
        <div class="input-section">
          <div class="section-label">输入区</div>
          <form id="parcelForm">
            <div class="chat-input-area">
              <textarea class="chat-textarea" id="complianceChat" rows="8" placeholder="请输入图斑信息，支持 JSON 格式描述...
示例格式：
{
  &#34;parcel_id&#34;: &#34;P20240199&#34;,
  &#34;location&#34;: &#34;浙江省杭州市西湖区&#34;,
  &#34;total_area_m2&#34;: 10000,
  &#34;dominant_type&#34;: &#34;耕地&#34;,
  &#34;is_mixed&#34;: true,
  &#34;land_types&#34;: [
    {&#34;type&#34;: &#34;耕地&#34;, &#34;area_m2&#34;: 6000, &#34;ratio&#34;: 0.6, &#34;confidence&#34;: 0.9},
    {&#34;type&#34;: &#34;建设用地&#34;, &#34;area_m2&#34;: 4000, &#34;ratio&#34;: 0.4, &#34;confidence&#34;: 0.85}
  ],
  &#34;low_confidence_areas&#34;: [&#34;图斑北部阴影区域&#34;]
}"></textarea>
            </div>
            <div class="form-group">
              <label>附件上传</label>
              <div class="upload-area" id="complianceUploadArea">
                <span class="upload-hint">点击或拖拽文件到此处上传</span>
                <input type="file" id="complianceFile" multiple accept=".json,.geojson,.shp,.tif,.tiff,.img,.png,.jpg">
              </div>
              <div class="upload-file-list" id="complianceFileList"></div>
            </div>
            <button type="submit" class="btn btn-primary" id="analyzeBtn">提交分析</button>
          </form>
        </div>

        <!-- 输出区 -->
        <div class="output-section">
          <div class="section-label">输出区</div>
          <div id="complianceOutput">
            <p class="placeholder">提交分析后，提示结论将在此显示</p>
          </div>
        </div>
      </div>

      <!-- ═══ 模块2：现状基底校核 ═══ -->
      <div class="module-content hidden" id="moduleComparison">
        <div class="module-desc">多套地理空间数据叠置对比，检查边界、地物、区划差异</div>

        <!-- 输入区 -->
        <div class="input-section">
          <div class="section-label">输入区</div>
          <form id="comparisonForm">
            <div class="chat-input-area">
              <textarea class="chat-textarea" id="comparisonChat" rows="8" placeholder="请输入现状基底校核信息，支持 JSON 格式描述...
示例格式：
{
  &quot;parcel_id&quot;: &quot;P20240199&quot;,
  &quot;location&quot;: &quot;浙江省杭州市西湖区&quot;,
  &quot;base_data&quot;: {
    &quot;source&quot;: &quot;2023年二调数据&quot;,
    &quot;dominant_type&quot;: &quot;耕地&quot;,
    &quot;total_area_m2&quot;: 10000
  },
  &quot;comp_data&quot;: {
    &quot;source&quot;: &quot;2024年遥感影像&quot;,
    &quot;dominant_type&quot;: &quot;建设用地&quot;,
    &quot;total_area_m2&quot;: 10500
  },
  &quot;checks&quot;: [&quot;边界范围变化&quot;, &quot;道路/水系/地块新增或消失&quot;, &quot;行政区划/村镇界线调整&quot;, &quot;老旧数据与现状实景差异&quot;]
}"></textarea>
            </div>
            <div class="form-group">
              <label>附件上传</label>
              <div class="upload-area" id="comparisonUploadArea">
                <span class="upload-hint">点击或拖拽文件到此处上传</span>
                <input type="file" id="comparisonFile" multiple accept=".json,.geojson,.shp,.tif,.tiff,.img,.png,.jpg">
              </div>
              <div class="upload-file-list" id="comparisonFileList"></div>
            </div>
            <button type="submit" class="btn btn-primary" id="compareBtn">提交校核</button>
          </form>
        </div>

        <!-- 输出区 -->
        <div class="output-section">
          <div class="section-label">输出区</div>
          <div id="comparisonOutput">
            <p class="placeholder">提交校核后，比对结果将在此显示</p>
          </div>
        </div>
      </div>


    </aside>
  </main>
  <script src="/static/js/app.js"></script>
</body>
</html>
