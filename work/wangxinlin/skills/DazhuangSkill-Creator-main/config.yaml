# dazhuangskill-creator 的人工可编辑默认值
# 经常要调的参数放这里，不要把它们散落到 JSON。
# 机器写入的运行产物、缓存、严格交换格式，依然可以继续用 JSON。

evaluation:
  num_workers: 10
  timeout: 30
  runs_per_query: 3
  trigger_threshold: 0.5
  model: ""

optimization:
  max_iterations: 5
  holdout: 0.4
  report: auto
  results_dir: ""
  model: ""

init_skill:
  output_path: ""
  resources: []
  sections: []
  # 注意：下面 memory_* 只影响“新创建出来的 skill”默认行为，
  # 不代表当前 dazhuangskill-creator 自己启用了记忆机制。
  memory_mode: "auto"
  # 建议给一个默认 intent，避免 auto 在无语义输入时误判为 off。
  memory_intent: ""
  memory_auto:
    lessons_score: 6
    adaptive_score: 3
  memory_thresholds:
    min_calls: 20
    min_retry_events: 2
    min_repeat_requests: 2
    window_size: 10
    failure_signature_threshold: 2
    promote_success_hits: 5
    promote_stable_window: 20
    max_active_lessons: 12
    retire_after_days: 30
    reactivation_cooldown_days: 14
  include_examples: false
  create_config: false
  create_openai_yaml: false

openai_yaml:
  interface_defaults:
    display_name: ""
    short_description: ""
    default_prompt: ""
    brand_color: ""
    icon_small: ""
    icon_large: ""

update_check:
  enabled: true
  repo: "DazhuangJammy/DazhuangSkill-Creator"
  branch: "main"
  version_file: "VERSION"
  version_url: ""
  interval_hours: 24
  timeout_seconds: 10
  auto_update: true
  remind_once_per_version: true
  manual_update_command: ""
  manual_update_url: ""

package_skill:
  output_dir: ""
