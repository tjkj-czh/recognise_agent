version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: change_monitor
      POSTGRES_PASSWORD: change_monitor_dev
      POSTGRES_DB: change_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U change_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  bff:
    build:
      context: ../..
      dockerfile: 05-deployment/docker/Dockerfile.bff
    environment:
      DATABASE_URL: postgresql://change_monitor:change_monitor_dev@postgres:5432/change_monitor
      REDIS_URL: redis://redis:6379
      SKILL_RUNTIME_URL: http://skill-runtime:8000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  skill-runtime:
    build:
      context: ../..
      dockerfile: 05-deployment/docker/Dockerfile.skill
    environment:
      DATABASE_URL: postgresql://change_monitor:change_monitor_dev@postgres:5432/change_monitor
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../../03-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bff

volumes:
  postgres_data:
  redis_data:
